\* Main TLC configuration
\* Use MatchingEngine_v2.cfg for quick verification (2 orders, 2 prices, <2 min)
\* Use this for deeper verification (requires ~6 min)

INIT Init
NEXT NextNoAmend

CONSTANTS
    NULL = NULL
    TICK_SIZE = 1
    MAX_QTY = 2
    MAX_ORDERS = 2
    MAX_CLOCK = 4
    PRICES = {1, 2, 3}

INVARIANTS
    BookUncrossed
    NoGhosts
    StatusConsistency
    FIFOWithinLevel
    NoRestingMarkets
    PostOnlyGuarantee
    STPGuarantee
    NoRestingMTL
    NoRestingMinQty
